<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0b3d91">
  <title>QuickTravel</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192x192.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <h1>QuickTravel</h1>
      <p class="tagline">Bike-share + express rail routing without legacy labels</p>
    </header>

    <form id="routeForm" class="route-form">
      <div class="field">
        <label for="from">From</label>
        <input id="from" name="from" required placeholder="Start e.g. Don Gratton House">
      </div>
      <div class="field">
        <label for="to">To</label>
        <input id="to" name="to" required placeholder="Destination e.g. Paddington">
      </div>
      <button id="submitRoute" type="submit" class="btn-primary">Find routes</button>
    </form>

    <section id="error" class="error-panel hidden" role="alert"></section>
    <section id="results" class="results"></section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
